[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200
via_ir = false

[rpc_endpoints]
ritual = "https://rpc.ritualfoundation.org"

[etherscan]
ritual = { key = "${ETHERSCAN_API_KEY}", url = "https://explorer.ritualfoundation.org/api" }
